<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        .navbar{
            background-color:antiquewhite;
            width:100vw;
            height:10vh;
            display:flex;
            justify-content: space-around;
            align-items:center;
            position:fixed;
            left:0;
            top:0;

        }
        .navlinks, ul{
            list-style:none;
            display: flex;
            
        }
        li{
            display:flex;
            padding:0px 100px;
            
        }
        a{
            text-decoration:none;
            color:black;
        }
        .search-button, .logo{
            font-weight:500px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">Logo</div>
            <ul class="navlinks">
            <li><a href="">Home</a></li>
            <li><a href="">About Us</a></li>
            <li><a href="">Contact</a></li>
            </ul>
        <div class="search-button">
            <input type="search" name="" id="">
            <button type="submit "> Login</button>
        </div>
        
    </div>
</body>
</html>
